name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Eldev cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/eldev
          key: ${{ runner.os }}-eldev-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox git make
          python3 -m pip install --user pre-commit
          ./scripts/install-eldev.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run CI checks
        run: make ci
